[platformio]
default_envs = lolin_c3_mini

; ──────────────────────────────────────────────────────────────────────────────
; CHOPP FRANQUIA — Firmware v2.0.0
; Compilar: pio run -e <env>
; Gravar:   pio run -e <env> --target upload
; Monitor:  pio device monitor -b 115200
; ──────────────────────────────────────────────────────────────────────────────

[env:lolin_c3_mini]
platform  = espressif32@6.4.0
board     = lolin_c3_mini
framework = arduino
monitor_speed = 115200
build_src_filter =
  +<main.cpp>
  +<config.h>
  +<protocol.h>
  +<auth_validator.cpp>
  +<auth_validator.h>
  +<ble_protocol.cpp>
  +<ble_protocol.h>
  +<command_parser.cpp>
  +<command_parser.h>
  +<command_history.cpp>
  +<command_history.h>
  +<command_queue.cpp>
  +<command_queue.h>
  +<flow_sensor.cpp>
  +<flow_sensor.h>
  +<valve_controller.cpp>
  +<valve_controller.h>
  +<watchdog.cpp>
  +<watchdog.h>

[env:esp32dev]
platform  = espressif32@6.4.0
board     = esp32dev
framework = arduino
